<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Standings Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #070710;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(220,40,40,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(40,80,220,0.12) 0%, transparent 60%);
    }
    .card {
      background: #0f0f1e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 48px 44px;
      width: 380px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      font-size: 48px;
      line-height: 1;
      margin-bottom: 12px;
      display: block;
    }
    .logo h1 {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #fff;
    }
    .logo p {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }
    .alert {
      background: rgba(220,40,40,0.15);
      border: 1px solid rgba(220,40,40,0.4);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #ff6b6b;
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
    }
    input[type="password"] {
      width: 100%;
      background: #1a1a2e;
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 15px;
      font-family: inherit;
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus {
      border-color: rgba(220,40,40,0.6);
    }
    .btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      background: linear-gradient(135deg, #dc2828, #b81e1e);
      border: none;
      border-radius: 10px;
      padding: 15px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-icon">🏆</span>
      <h1>Standings Bot</h1>
      <p>Admin Panel</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST" action="/login">
      <label for="password">Admin Password</label>
      <input type="password" id="password" name="password" placeholder="Enter password..." autofocus required/>
      <button type="submit" class="btn">Login</button>
    </form>
  </div>
</body>
</html>

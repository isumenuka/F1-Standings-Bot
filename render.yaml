services:
  # ── Discord Bot (Background Worker) ──────────────────────────────────────
  - type: worker
    name: discord-standings-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot/bot.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false          # Set this manually in Render dashboard
      - key: APPLICATION_ID
        sync: false
      - key: DATABASE_URL
        sync: false          # Set this manually to the PostgreSQL Internal Database URL
      - key: DATA_PATH
        value: shared/data.json
      - key: PYTHONUNBUFFERED
        value: "1"

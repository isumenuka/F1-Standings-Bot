services:
  # ── Discord Bot (Background Worker) ──────────────────────────────────────
  - type: worker
    name: discord-standings-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot/bot.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false          # Set this manually in Render dashboard
      - key: APPLICATION_ID
        sync: false
      - key: DATA_PATH
        value: shared/data.json
      - key: PYTHONUNBUFFERED
        value: "1"

  # ── Admin Web Panel (Web Service) ─────────────────────────────────────────
  - type: web
    name: discord-standings-web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python web/app.py
    envVars:
      - key: ADMIN_PASSWORD
        sync: false          # Set this manually in Render dashboard
      - key: SECRET_KEY
        sync: false
      - key: DATA_PATH
        value: shared/data.json
      - key: PORT
        value: "5000"
      - key: PYTHONUNBUFFERED
        value: "1"
